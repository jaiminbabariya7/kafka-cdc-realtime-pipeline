version: "3.8"

services:
  # Source database
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: ecommerce
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    command: ["postgres", "-c", "wal_level=logical", "-c", "max_replication_slots=5", "-c", "max_wal_senders=5"]
    ports: ["5432:5432"]
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      retries: 5

  # Kafka broker
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on: [zookeeper]
    ports: ["9092:9092"]
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_LOG_RETENTION_HOURS: 168
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      retries: 5

  # Schema Registry
  schema-registry:
    image: confluentinc/cp-schema-registry:7.5.0
    depends_on: [kafka]
    ports: ["8081:8081"]
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:29092

  # Kafka Connect + Debezium
  kafka-connect:
    image: debezium/connect:2.5
    depends_on: [kafka, postgres]
    ports: ["8083:8083"]
    environment:
      BOOTSTRAP_SERVERS: kafka:29092
      GROUP_ID: debezium-connect
      CONFIG_STORAGE_TOPIC: debezium_configs
      OFFSET_STORAGE_TOPIC: debezium_offsets
      STATUS_STORAGE_TOPIC: debezium_status
      CONNECT_KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      POSTGRES_HOST: postgres
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ecommerce
      GCP_PROJECT_ID: ${GCP_PROJECT_ID}
      BQ_CDC_DATASET: ${BQ_CDC_DATASET}
      GOOGLE_APPLICATION_CREDENTIALS: /opt/kafka/config/gcp-key.json
    volumes:
      - ${GOOGLE_APPLICATION_CREDENTIALS}:/opt/kafka/config/gcp-key.json:ro

  # Kafka UI
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    depends_on: [kafka, schema-registry]
    ports: ["8080:8080"]
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_SCHEMAREGISTRY: http://schema-registry:8081
      KAFKA_CLUSTERS_0_KAFKACONNECT_0_NAME: debezium
      KAFKA_CLUSTERS_0_KAFKACONNECT_0_ADDRESS: http://kafka-connect:8083

  # CDC Consumer
  cdc-consumer:
    build: { context: .., dockerfile: docker/Dockerfile }
    command: python consumers/cdc_consumer.py --tables orders,customers,products,order_items
    depends_on: [kafka, kafka-connect]
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      GCP_PROJECT_ID: ${GCP_PROJECT_ID}
      BQ_CDC_DATASET: ${BQ_CDC_DATASET}
      GOOGLE_APPLICATION_CREDENTIALS: /app/gcp-key.json
    volumes:
      - ${GOOGLE_APPLICATION_CREDENTIALS}:/app/gcp-key.json:ro
    restart: unless-stopped

  # Stream processor
  stream-processor:
    build: { context: .., dockerfile: docker/Dockerfile }
    command: python consumers/stream_processor.py
    depends_on: [cdc-consumer]
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      GCP_PROJECT_ID: ${GCP_PROJECT_ID}
      BQ_CDC_DATASET: ${BQ_CDC_DATASET}
      GOOGLE_APPLICATION_CREDENTIALS: /app/gcp-key.json
      FLUSH_INTERVAL_SECS: "30"
    volumes:
      - ${GOOGLE_APPLICATION_CREDENTIALS}:/app/gcp-key.json:ro
    restart: unless-stopped

volumes:
  postgres_data: